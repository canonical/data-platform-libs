type: charm
bases:
  - build-on:
      - name: "ubuntu"
        channel: "22.04"
    run-on:
      - name: "ubuntu"
        channel: "22.04"

parts:
  charm:
    charm-binary-python-packages:
      - cryptography

config:
  options:
    send-ca-cert:
      description: Send the CA certificate instead of end-entity certificate
      type: boolean
      default: false
